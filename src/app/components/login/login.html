<div class="login-container">
  <div class="login-card">
    <h2>Agenda Aurora</h2>
    <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
      <div class="form-group">
        <label for="email">Email:</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="ejemplo@correo.com"
          required
        />
      </div>
      <div class="form-group">
        <label for="password">Contraseña:</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          placeholder="Mínimo 6 caracteres"
          required
        />
      </div>
      <button type="submit" [disabled]="loginForm.invalid" class="btn-primary">
        Iniciar Sesión
      </button>
    </form>
    <p>¿No tienes cuenta? <a routerLink="/register">Regístrate aquí</a></p>
  </div>
</div>

<div class="modal-overlay" *ngIf="mostrandoModalError">
  <div class="modal-box">
    <h3>Error de acceso</h3>
    <p>
      El correo electrónico o la contraseña no son válidos. Por favor, verifícalos e inténtalo de
      nuevo.
    </p>
    <button class="btn-danger" (click)="cerrarModalError()">Cerrar</button>
  </div>
</div>
